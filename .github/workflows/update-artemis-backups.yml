name: Update Artemis backups

on:
  schedule:
    - cron: "0 23 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update backups
        run: node scripts/update-artemis-backups.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No backup changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/artemis-backup.json
          if [ -d assets/img/adjudicados ]; then
            git add assets/img/adjudicados
          fi
          git commit -m "Update Artemis backups"
          git push
