            "mainEntity": [
              {
                "@type": "Question",
                "name": "¿Qué es Club San Jorge en capitalización y ahorro?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Es un sistema de capitalización y ahorro. El suscriptor abona cuotas para formar un capital y participa de sorteos mensuales cuando el título está vigente y cumple las condiciones de pago correspondientes."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué se obtiene al finalizar el plazo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Al terminar el plazo, se considera el valor nominal inicial suscripto. Si el titular aceptó endosos de ampliación automática, también se consideran los valores que correspondan por esas ampliaciones, según la documentación del plan."
                }
              },
              {
                "@type": "Question",
                "name": "¿Las cuotas son fijas?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "En opciones asociadas a 0 km, el suscriptor puede no actualizar la cuota y conservar el valor nominal indicado al suscribirse, o aceptar un endoso de ampliación automática para acompañar cambios de valor o modelo del bien asociado al plan."
                }
              },
              {
                "@type": "Question",
                "name": "¿Cómo se realizan los sorteos mensuales?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Los sorteos se realizan mediante la Lotería de la Ciudad de Buenos Aires (LOTBA), en la última jugada de cada mes, salvo excepciones previamente aprobadas por la autoridad correspondiente."
                }
              },
              {
                "@type": "Question",
                "name": "¿Si salgo adjudicado debo seguir pagando?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Si resultás adjudicado, podés recibir el beneficio y optar por retirarte del plan; en ese caso no seguís pagando las cuotas futuras. También podés mantener el título vigente, continuar abonando y seguir participando en los sorteos mensuales."
                }
              },
              {
                "@type": "Question",
                "name": "¿Es un préstamo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Al suscribirte no recibís dinero que luego debas devolver: abonás cuotas para formar un capital dentro de un título de capitalización y ahorro."
                }
              },
              {
                "@type": "Question",
                "name": "¿Es una rifa?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Aunque el título participa de sorteos mensuales, el sistema no se reduce a pagar por una posibilidad de ganar. Las cuotas forman un capital dentro de un título de capitalización y ahorro."
                }
              },
              {
                "@type": "Question",
                "name": "¿Estoy comprando un vehículo en cuotas?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. La suscripción no es una compraventa financiada ni asegura la entrega automática de un vehículo por haber pagado cierta cantidad de cuotas. Lo contratado es un título de capitalización y ahorro con un valor nominal."
                }
              },
              {
                "@type": "Question",
                "name": "¿Se puede licitar para salir adjudicado?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. Este sistema no tiene un mecanismo de licitación. El beneficio se obtiene mediante los sorteos mensuales previstos, siempre que el título esté vigente y la cuota correspondiente se encuentre abonada."
                }
              }

          <p>Una guía clara para entender qué estás eligiendo, con qué no hay que confundirlo, cómo participás de los sorteos y qué opciones tenés si resultás adjudicado.</p>
        </div>
      </section>
      <section class="system-guide-body">
        <div class="container">
          <div data-system-guide-page></div>
          <noscript>
            <section>
              <h2>Conceptos principales</h2>
              <p>El Plan 330 es un título de capitalización y ahorro organizado en cuotas mensuales. No debe leerse como una compra directa ni como una entrega automática de vehículo.</p>
              <p>No es un préstamo, una rifa ni un sistema de licitación. Si resultás adjudicado, podés optar por retirarte y no seguir pagando cuotas futuras, o mantener el título vigente para continuar participando.</p>
              <p>Para interpretar una opción conviene revisar valor nominal, cuota comercial, sorteos, endosos, rescate y documentación vigente.</p>
              <p><a href="../assets/docs/plan-330.pdf">Abrir contrato del Plan 330</a></p>
            </section>
          </noscript>
        </div>
      </section>
