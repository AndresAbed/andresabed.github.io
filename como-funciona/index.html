            "mainEntity": [
              {
                "@type": "Question",
                "name": "¿Qué es Club San Jorge en capitalización y ahorro?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Es un sistema de capitalización y ahorro. El suscriptor abona cuotas para formar un capital y participa de sorteos mensuales cuando el título está vigente y cumple las condiciones de pago correspondientes."
                }
              },
              {
                "@type": "Question",
                "name": "¿Qué se obtiene al finalizar el plazo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Al terminar el plazo, se considera el valor nominal inicial suscripto. Si el titular aceptó endosos de ampliación automática, también se consideran los valores que correspondan por esas ampliaciones, según la documentación del plan."
                }
              },
              {
                "@type": "Question",
                "name": "¿Las cuotas son fijas?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "En opciones asociadas a 0 km, el suscriptor puede no actualizar la cuota y conservar el valor nominal indicado al suscribirse, o aceptar un endoso de ampliación automática para acompañar cambios de valor o modelo del bien asociado al plan."
                }
              },
              {
                "@type": "Question",
                "name": "¿Cómo se realizan los sorteos mensuales?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Los sorteos se realizan mediante la Lotería de la Ciudad de Buenos Aires (LOTBA), en la última jugada de cada mes, salvo excepciones previamente aprobadas por la autoridad correspondiente."
                }
              },
              {
                "@type": "Question",
                "name": "¿Si salgo adjudicado debo seguir pagando?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Ante una adjudicación, existen alternativas previstas por el sistema: retirar el beneficio y continuar abonando para seguir participando, o retirarse del plan según las condiciones aplicables. La decisión debe revisarse con la documentación del título."
                }
              }

          <p>Una guía clara para entender qué estás eligiendo, cómo se interpreta el valor nominal, cuándo participás de sorteos y qué documentación conviene revisar.</p>
        </div>

          <noscript>
            <section>
              <h2>Conceptos principales</h2>
              <p>El Plan 330 es un título de capitalización y ahorro organizado en cuotas mensuales. No debe leerse como una compra directa ni como una entrega automática de vehículo.</p>
              <p>Para interpretar una opción conviene revisar valor nominal, cuota comercial, sorteos, endosos, rescate y documentación vigente.</p>
